<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gincana Meio Ambiente 2026</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    html,body{
        width:100%;
        height:100%;
        overflow:hidden;
        background:#000;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .banner{
        width:100vw;
        height:100vh;
        object-fit:contain;
    }

    /* Botão Quiz */
    .quiz-btn{
        position:fixed;
        right:25px;
        bottom:25px;
        width:90px;
        height:90px;
        border-radius:50%;
        background:linear-gradient(135deg,#2e7d32,#4caf50);
        color:white;
        text-decoration:none;
        display:flex;
        align-items:center;
        justify-content:center;
        flex-direction:column;
        font-weight:bold;
        font-size:22px;
        box-shadow:0 6px 20px rgba(0,0,0,.4);
        border:4px solid white;
        transition:.3s;
        z-index:9999;
    }

    .quiz-btn:hover{
        transform:scale(1.1);
    }

    .quiz-btn span{
        font-size:12px;
        margin-top:2px;
        letter-spacing:1px;
    }

    @keyframes pulse{
        0%{transform:scale(1);}
        50%{transform:scale(1.08);}
        100%{transform:scale(1);}
    }

    .quiz-btn{
        animation:pulse 2s infinite;
    }

    @media (max-width:768px){
        .quiz-btn{
            width:75px;
            height:75px;
            font-size:18px;
            right:15px;
            bottom:15px;
        }
    }
</style>
</head>
<body>

<img src="gincana.png" alt="Gincana Meio Ambiente 2026" class="banner">

<a
    href="https://eco-quiz-sparkle.lovable.app/"
    target="_blank"
    class="quiz-btn"
    title="Acessar Quiz Ambiental"
>
    🧠
    <span>QUIZ</span>
</a>

<script>
    document.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
    }, { once: true });
</script>

</body>
</html>
