<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gincana Meio Ambiente 2026</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    img {
        width: 100vw;
        height: 100vh;
        object-fit: contain; /* mantém a imagem inteira */
    }
</style>
</head>
<body>

<img src="gincana.png" alt="Gincana Meio Ambiente 2026">

<script>
    // F11 automático em navegadores que permitirem
    document.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
    }, { once: true });
</script>

</body>
</html>
